# ============================================================================
# SPRING BOOT APPLICATION PROPERTIES - CONTINUUM API
# ============================================================================

# -------------------------------------------------------
# Spring Main & Security
# -------------------------------------------------------
spring.main.allow-circular-references=true
spring.main.banner-mode=off

# -------------------------------------------------------
# MongoDB Atlas
# -------------------------------------------------------
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}

# -------------------------------------------------------
# Servidor e URLs
# -------------------------------------------------------
server.port=${PORT:8080}
app.url=${APP_URL:http://localhost:5173}

# -------------------------------------------------------
# Google OAuth2 (Chaves Customizadas + Padrão Spring)
# -------------------------------------------------------
# Para o seu GoogleOAuthService (@Value)
google.oauth.client-id=${GOOGLE_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET}

# Para o Spring Security OAuth2 Client
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# Provedor Google padrão do Spring
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# -------------------------------------------------------
# JWT Configuration
# -------------------------------------------------------
jwt.secret=${JWT_SECRET}
jwt.access-token.expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token.expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
jwt.expiration=${JWT_EXPIRATION:900000}

# -------------------------------------------------------
# Backblaze B2 (Vault)
# -------------------------------------------------------
vault.b2.endpoint=${VAULT_B2_ENDPOINT:s3.us-east-005.backblazeb2.com}
vault.b2.bucket-name=${VAULT_B2_BUCKET:continuum-vaults}
vault.b2.access-key=${VAULT_B2_ACCESS_KEY}
vault.b2.secret-key=${VAULT_B2_SECRET_KEY}
vault.b2.region=${VAULT_B2_REGION:us-east-005}

# -------------------------------------------------------
# Resend (Email)
# -------------------------------------------------------
resend.api-key=${RESEND_API_KEY}
email.from=${EMAIL_FROM:noreply@continuum.com}
email.verification.url=${EMAIL_VERIFICATION_URL:${app.url}/verify-email}

# -------------------------------------------------------
# Stripe
# -------------------------------------------------------
stripe.api.key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
stripe.success.url=${app.url}/subscription/success
stripe.cancel.url=${app.url}/subscription/cancel

stripe.price.plus=${STRIPE_PRICE_ID_PLUS}
stripe.price.pro=${STRIPE_PRICE_ID_PRO}
stripe.price.gold=${STRIPE_PRICE_ID_VISION}

# -------------------------------------------------------
# Planos (Limites)
# -------------------------------------------------------
plan.free.max-entities=20
plan.free.max-notes=50
plan.free.max-habits=3
plan.free.max-vault-size-mb=100

plan.plus.max-entities=100
plan.plus.max-notes=500
plan.plus.max-habits=10
plan.plus.max-vault-size-mb=1024

plan.pro.max-entities=-1
plan.pro.max-notes=-1
plan.pro.max-habits=-1
plan.pro.max-vault-size-mb=2048

# -------------------------------------------------------
# Outras Configurações
# -------------------------------------------------------
cors.allowed.origins=${app.url}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# -------------------------------------------------------
# Logging
# -------------------------------------------------------
logging.level.tech.lemnova.continuum=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
