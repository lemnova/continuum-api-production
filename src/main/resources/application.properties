# ============================================================================
# SPRING BOOT APPLICATION PROPERTIES - JPA + H2 Configuration
# ============================================================================

# Database Configuration - H2 (Development)
# For production, switch to PostgreSQL with:
# spring.datasource.url=jdbc:postgresql://localhost:5432/continuum
# spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.url=jdbc:h2:mem:continuum;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (Development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# ============================================================================
# MULTIPART FILE UPLOAD CONFIGURATION - Security
# ============================================================================
# Limita o tamanho máximo de arquivo para uploads (ex: Vault attachments)
# Configured to prevent DoS (Denial of Service) attacks via large file uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# JWT Configuration
# HS256 requires at least 256 bits (32 bytes). MANDATORY in production!
# Generate with: openssl rand -base64 32
jwt.secret=${JWT_SECRET:dev-secret-key-should-be-minimum-32-characters-long}

# Access Token: 15 minutes (short-lived)
jwt.access-token.expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}

# Refresh Token: 7 days (long-lived, for token rotation)
jwt.refresh-token.expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# Legacy (deprecated) - kept for backwards compatibility
jwt.expiration=${JWT_EXPIRATION:900000}

# Email Configuration
resend.api-key=${RESEND_API_KEY:}
email.from=${EMAIL_FROM:noreply@continuum.com}
email.verification.url=${EMAIL_VERIFICATION_URL:http://localhost:5173/verify-email}
app.url=${APP_URL:http://localhost:5173}

# Stripe Configuration
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_}
stripe.price.pro=${STRIPE_PRICE_PRO_ID:price_}
stripe.success.url=${STRIPE_SUCCESS_URL:http://localhost:5173/subscription/success}
stripe.cancel.url=${STRIPE_CANCEL_URL:http://localhost:5173/subscription/cancel}

# CORS Configuration
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ============================================================================
# JWT / TOKEN SECURITY CONFIGURATION
# ============================================================================
# 
# IMPORTANT: Token Strategy (Recommendation for Frontend)
# ==========================================
# 
# CURRENT: Bearer Tokens in Authorization Header (RECOMMENDED)
# - AccessToken: Stored in memory (NEVER localStorage/sessionStorage for XSS prevention)
# - RefreshToken: Stored in HttpOnly Secure SameSite=Strict Cookie (if using cookies)
#                 OR in memory with secure refresh flow
# 
# COOKIE FORMAT (if implementing cookie-based tokens):
# Response headers should set:
#   Set-Cookie: refreshToken=<token>; HttpOnly; Secure; SameSite=Strict; Path=/; Max-Age=604800
#
# SECURITY NOTES:
# 1. TokenBlacklist is enabled: revoked tokens are checked on every request
# 2. Access tokens are SHORT-LIVED (15 min) to minimize damage if compromised
# 3. Refresh tokens are ROTATED: old refresh token is blacklisted after use
# 4. Logout immediately blacklists both tokens

# Logging
logging.level.org.springframework.data.jpa=INFO
logging.level.org.hibernate=INFO
logging.level.tech.lemnova.continuum=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springdoc=INFO
logging.level.com.fasterxml.jackson=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Google OAuth
google.oauth.client-id=${GOOGLE_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:}
google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/auth/google/callback}

# Backblaze B2 Vault Configuration (Optional - for file storage)
vault.b2.endpoint=${VAULT_B2_ENDPOINT:s3.us-east-005.backblazeb2.com}
vault.b2.bucket-name=${VAULT_B2_BUCKET:}
vault.b2.access-key=${VAULT_B2_ACCESS_KEY:}
vault.b2.secret-key=${VAULT_B2_SECRET_KEY:}
vault.b2.region=${VAULT_B2_REGION:}

vault.b2.bucket-name=continuum-vaults
vault.b2.access-key=${B2_ACCESS_KEY:}
vault.b2.secret-key=${B2_SECRET_KEY:}
vault.b2.region=us-east-005

# NOVAS CONFIGURAÇÕES (OPCIONAIS)
journal.max-content-size=${JOURNAL_MAX_CONTENT_SIZE:1048576}
vault.metadata-cache-ttl=${VAULT_METADATA_CACHE_TTL:300}

# ============================================================================
# SWAGGER / OPENAPI CONFIGURATION
# ============================================================================
# Documentação disponível em:
#   - Swagger UI: http://localhost:8080/swagger-ui.html
#   - OpenAPI JSON: http://localhost:8080/v3/api-docs
#   - OpenAPI YAML: http://localhost:8080/v3/api-docs.yaml
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-login-endpoint=true
