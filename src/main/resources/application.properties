# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/continuum}
spring.data.mongodb.database=${MONGODB_DATABASE:continuum}

# Server Configuration
server.port=${SERVER_PORT:8080}

# JWT Configuration
jwt.secret=${JWT_SECRET:my-super-secret-key-that-needs-to-be-at-least-256-bits-long-for-hs256-algorithm-to-work-properly-change-this-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Email Configuration
resend.api.key=${RESEND_API_KEY:}
email.from=${EMAIL_FROM:noreply@continuum.com}
email.verification.url=${EMAIL_VERIFICATION_URL:http://localhost:5173/verify-email}

# Stripe Configuration
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_}
stripe.price.pro=${STRIPE_PRICE_PRO_ID:price_}
stripe.success.url=${STRIPE_SUCCESS_URL:https://lncontinuum.lovable.app/subscription/success}
stripe.cancel.url=${STRIPE_CANCEL_URL:https://lncontinuum.lovable.app/subscription/cancel}

# CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=INFO
logging.level.tech.lemnova.continuum_backend=INFO
logging.level.org.springframework.security=INFO

# Pretty print JSON logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
