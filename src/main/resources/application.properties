# ======================================================================
# Server & App Details
# ======================================================================
server.port=${SERVER_PORT:8080}
app.url=${APP_URL:http://localhost:5173}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# ======================================================================
# Database - Default to H2 (In-memory) for Dev
# ======================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:continuum;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${SPRING_H2_CONSOLE_PATH:/h2-console}

# ======================================================================
# Security & JWT
# ======================================================================
# HS256 requires 256 bits. Use a real key in production!
jwt.secret=${JWT_SECRET:dev-secret-key-at-least-32-characters-long-12345}
jwt.access-token.expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token.expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
jwt.expiration=${JWT_EXPIRATION:900000}

# ======================================================================
# Stripe Integration
# ======================================================================
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_}

# IDs dos Pre├¦os (Mapeados para os nomes Plus, Pro e Gold/Vision)
stripe.price.plus=${STRIPE_PRICE_ID_PLUS:price_plus_id}
stripe.price.pro=${STRIPE_PRICE_ID_PRO:price_pro_id}
stripe.price.gold=${STRIPE_PRICE_ID_VISION:price_gold_id}

stripe.success.url=${STRIPE_SUCCESS_URL:http://localhost:5173/success}
stripe.cancel.url=${STRIPE_CANCEL_URL:http://localhost:5173/cancel}

# ======================================================================
# Plan Limits (Business Rules)
# ======================================================================
plan.free.max-entities=${PLAN_FREE_MAX_ENTITIES:20}
plan.free.max-notes=${PLAN_FREE_MAX_NOTES:100}
plan.free.max-vault-size-mb=${PLAN_FREE_MAX_VAULT_SIZE_MB:50}

plan.pro.max-entities=${PLAN_PRO_MAX_ENTITIES:500}
plan.pro.max-notes=${PLAN_PRO_MAX_NOTES:10000}
plan.pro.max-vault-size-mb=${PLAN_PRO_MAX_VAULT_SIZE_MB:5120}

# ======================================================================
# Infrastructure: Cloud Vault (B2) & OAuth
# ======================================================================
vault.b2.endpoint=${VAULT_B2_ENDPOINT:s3.us-east-005.backblazeb2.com}
vault.b2.bucket-name=${VAULT_B2_BUCKET:continuum-vaults}
vault.b2.access-key=${VAULT_B2_ACCESS_KEY:}
vault.b2.secret-key=${VAULT_B2_SECRET_KEY:}
vault.b2.region=${VAULT_B2_REGION:us-east-005}

cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
google.oauth.client-id=${GOOGLE_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:}

# ======================================================================
# Swagger & OpenAPI
# ======================================================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html