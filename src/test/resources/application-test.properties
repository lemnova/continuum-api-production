# Test Configuration - H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=true

# MongoDB Mock (disabled for JPA tests)
spring.data.mongodb.uri=mongodb://localhost:27017/continuum-test

# Frontend URL
frontend.url=http://localhost:5173
app.url=http://localhost:5173

# Logging
logging.level.sql=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# OAuth2 Google Configuration (fictitious for tests)
spring.security.oauth2.client.registration.google.client-id=fake-id
spring.security.oauth2.client.registration.google.client-secret=fake-secret
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo

# Allow bean definition overriding for tests
spring.main.allow-bean-definition-overriding=true
